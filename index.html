<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Land of Dawn Codex &ndash; Mobile Legends: Bang Bang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/home.css">
  </head>
  <body>

    <!-- NAVBAR -->
    <nav>
      <div class="nav-logo">
         <img src="images/home/land-of-dawn-codex-logo.png" alt="Land of Dawn Codex" class="nav-logo-img">
      </div>

      <ul class="nav-links">
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#heroes">Heroes</a></li>
        <li><a href="#skins">Skins</a></li>
        <li><a href="#prep">Preparation</a></li>
        <li><a href="#guides">In-Game Guides</a></li>
        <li><a href="#modes">Game Modes</a></li>
        <li><a href="#mini">Mini-Games</a></li>
      </ul>

      <button class="nav-search" id="searchBtn" aria-label="Search">&#x2315;</button>
    </nav>

    <!-- SEARCH OVERLAY -->
    <div class="search-overlay" id="searchOverlay">
      <div class="search-box">
        <input class="search-input" type="text" placeholder="Search heroes, skins, guides..." id="searchInput" />
        <button class="search-close" id="searchClose">&#x2715;</button>
      </div>
    </div>

    <!-- HERO BANNER -->
    <section class="hero">
      <div class="hero-bg"></div>

      <div class="stars" id="stars"></div>

      <div class="lightning"></div>
      <div class="lightning2"></div>

      <div class="hero-glow"></div>

      <div class="hero-content">
        <p class="welcome-text">Welcome to</p>
        <img 
          src="images/home/mobile-legends-logo.png"
          alt="Mobile Legends: Bang Bang"
          class="hero-logo-img"
        >
        <p class="hero-desc">Team up, strategize, and claim victory in every battle! Your ultimate 5v5 MOBA experience.</p>
        <a href="https://play.google.com/store/apps/details?gl=GB&hl=en-GB&id=com.mobile.legends" class="btn-play" target="_blank">
          <span>&#9654; Play Now</span>
        </a>
      </div>
    </section>

    <!-- SECTION GRID -->
    <section class="section-grid">
      <div class="divider reveal"><div class="divider-gem"></div></div>

      <div class="grid-main"></div>

      <!-- HEROES (large left) -->
        <div class="card heroes-card reveal" id="heroes">
          <div class="card-bg" style="background-image: url('images/home/heroes-img.png');"></div>
          <div class="card-overlay"></div>
          <div class="card-content">
            <div class="card-tag gold">Heroes</div>
            <div class="card-desc">100+ Heroes.<br>Find your main.</div>
            <div class="carousel-dots">
              <div class="dot"></div>
              <div class="dot inactive"></div>
              <div class="dot inactive"></div>
            </div>
          </div>
          <div class="card-arrow left">&#8249;</div>
          <div class="card-arrow right">&#8250;</div>
        </div>
    </section>

    <script src="scripts/search-overlay.js"></script>
    <script src="scripts/stars.js"></script>
    <script src="scripts/scroll.js"></script>
    <script src="scripts/carousel-dots.js"></script>
  </body>
</html>
