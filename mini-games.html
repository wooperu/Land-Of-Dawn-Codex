    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/land-of-dawn-codex-header.css">
    <link rel="stylesheet" href="styles/pages/mini-games.css">
  </head>
  <body>

    <nav>
      <div class="nav-logo">
        <img src="images/home/land-of-dawn-codex-logo.png" alt="Land of Dawn Codex" class="nav-logo-img">
      </div>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="heroes.html">Heroes</a></li>
        <li><a href="skins.html">Skins</a></li>
        <li><a href="preparation.html">Preparation</a></li>
        <li><a href="in-game-guide.html">In-Game Guides</a></li>
        <li><a href="game-modes.html">Game Modes</a></li>
        <li><a href="mini-games.html" class="active">Mini-Games</a></li>
        <li><a href="ai-chat-bot.html">AI Chat Bot</a></li>
      </ul>

      <button class="nav-search" id="searchBtn" aria-label="Search">&#x2315;</button>
    </nav>

    <div class="search-overlay" id="searchOverlay">
      <div class="search-box">
        <input class="search-input" type="text" placeholder="Search heroes, skins, guides…" id="searchInput" />
        <button class="search-close" id="searchClose">&#x2715;</button>
      </div>
    </div>

    <section class="section-grid">
      <div class="divider reveal"><div class="divider-gem"></div></div>

      <div class="grid-main">

        <a href="guessVO.html" class="card heroes-card reveal">
          <div class="card-bg" style="background-image: url('images/home/heroes-img.png');"></div>
          <div class="card-overlay"></div>
          <div class="card-content">
            <div class="card-tag gold">Guess the Character</div>
            <div class="card-desc">100+ Heroes.<br>Find your main.</div>
            <div class="carousel-dots">
              <div class="dot"></div>
              <div class="dot inactive"></div>
              <div class="dot inactive"></div>
            </div>
          </div>
          <div class="card-arrow left">&#8249;</div>
          <div class="card-arrow right">&#8250;</div>
        </a>

        <a href="memoryGame.html" class="card skins-card reveal">
          <div class="card-bg" style="background-image: url('images/home/skins-img.png');"></div>
          <div class="card-overlay" style="background:linear-gradient(135deg,rgba(8,11,24,0.75) 0%,rgba(8,11,24,0.3) 50%,transparent 100%)"></div>
          <div style="position:absolute;top:1.5rem;right:2rem;font-size:1.4rem;color:#fbbf24;opacity:0.7;animation:twinkle 2s infinite">&#10022;</div>
          <div style="position:absolute;top:3rem;right:5rem;font-size:0.9rem;color:#fbbf24;opacity:0.4;animation:twinkle 3s 1s infinite">&#10022;</div>
          <div class="card-content">
            <div class="card-tag" style="color:#fbbf24">Memory Game!</div>
            <div class="card-desc">Stunning Braincell.<br>Show me your motivation!</div>
          </div>
        </a>

      </div>

      <div class="divider reveal" style="margin-top:1.5rem"><div class="divider-gem"></div></div>
    </section>

    <script src="scripts/stars.js"></script>
    <script src="scripts/search-overlay.js"></script>
    <script src="scripts/scroll-reveal.js"></script>
    <script src="scripts/carousel-dots.js"></script>
  </body>
